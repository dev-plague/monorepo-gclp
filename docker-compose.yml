services:
  db:
    image: postgres:17-alpine
    container_name: gclp-postgres
    restart: always
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: gclp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: gclp-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@gclp.com
      PGADMIN_DEFAULT_PASSWORD: devpass
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data: